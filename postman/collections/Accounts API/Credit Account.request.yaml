$kind: http-request
description: Applies a credit to an account balance
url: '{{baseUrl}}/accounts/:id/credit'
method: POST
headers:
  Content-Type: application/json
pathVariables:
  - key: id
    value: '{{accountId}}'
    description: The account ID
body:
  type: json
  content: |-
    {
    	"amount": 100
    }
scripts:
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();

      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response time is under 1000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });

      pm.test('Content-Type is application/json', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response has accountId and balance', function () {
          pm.expect(jsonData).to.have.property('accountId');
          pm.expect(jsonData).to.have.property('balance');
      });

      pm.test('Response only contains accountId and balance fields', function () {
          const keys = Object.keys(jsonData).sort();
          pm.expect(keys).to.deep.equal(['accountId', 'balance']);
      });

      pm.test('accountId is a non-empty string', function () {
          pm.expect(jsonData.accountId).to.be.a('string').and.not.empty;
      });

      pm.test('accountId matches the requested account', function () {
          const requestedId = pm.collectionVariables.get('accountId');
          if (requestedId) {
              pm.expect(jsonData.accountId).to.equal(requestedId);
          }
      });

      pm.test('Balance is a number', function () {
          pm.expect(jsonData.balance).to.be.a('number');
      });

      pm.test('Balance reflects the credited amount', function () {
          pm.expect(jsonData.balance).to.be.at.least(100);
      });

      pm.test('Store updated balance for later use', function () {
          pm.collectionVariables.set('lastBalance', jsonData.balance);
      });
    language: text/javascript
order: 4000

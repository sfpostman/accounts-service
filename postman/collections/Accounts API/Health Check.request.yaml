$kind: http-request
description: Basic service health check
url: '{{baseUrl}}/health'
method: GET
scripts:
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();

      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response time is under 500ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(500);
      });

      pm.test('Content-Type is application/json', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response has status and service fields', function () {
          pm.expect(jsonData).to.have.property('status');
          pm.expect(jsonData).to.have.property('service');
      });

      pm.test('Status is ok', function () {
          pm.expect(jsonData.status).to.equal('ok');
      });

      pm.test('Service is accounts-api', function () {
          pm.expect(jsonData.service).to.equal('accounts-api');
      });

      pm.test('Status is a non-empty string', function () {
          pm.expect(jsonData.status).to.be.a('string').and.not.empty;
      });

      pm.test('Service is a non-empty string', function () {
          pm.expect(jsonData.service).to.be.a('string').and.not.empty;
      });

      pm.test('Response only contains status and service fields', function () {
          const keys = Object.keys(jsonData).sort();
          pm.expect(keys).to.deep.equal(['service', 'status']);
      });
    language: text/javascript
order: 6000

$kind: http-request
description: Lists accounts for a user
url: '{{baseUrl}}/accounts?userId=u1'
method: GET
queryParams:
  - key: userId
    value: u1
    description: The user ID to filter accounts by
scripts:
  - type: afterResponse
    code: |-
      const jsonData = pm.response.json();

      pm.test('Status code is 200', function () {
          pm.response.to.have.status(200);
      });

      pm.test('Response time is under 1000ms', function () {
          pm.expect(pm.response.responseTime).to.be.below(1000);
      });

      pm.test('Content-Type is application/json', function () {
          pm.expect(pm.response.headers.get('Content-Type')).to.include('application/json');
      });

      pm.test('Response has accounts array', function () {
          pm.expect(jsonData).to.have.property('accounts');
          pm.expect(jsonData.accounts).to.be.an('array');
      });

      pm.test('Response only contains accounts field', function () {
          pm.expect(Object.keys(jsonData)).to.deep.equal(['accounts']);
      });

      pm.test('Each account has required fields', function () {
          jsonData.accounts.forEach(function (account) {
              pm.expect(account).to.have.property('id');
              pm.expect(account).to.have.property('userId');
              pm.expect(account).to.have.property('type');
              pm.expect(account).to.have.property('createdAt');
          });
      });

      pm.test('Each account field types are correct', function () {
          jsonData.accounts.forEach(function (account) {
              pm.expect(account.id).to.be.a('string').and.not.empty;
              pm.expect(account.userId).to.be.a('string').and.not.empty;
              pm.expect(account.type).to.be.a('string').and.not.empty;
              pm.expect(account.createdAt).to.be.a('string').and.not.empty;
          });
      });

      pm.test('All accounts belong to the requested userId', function () {
          jsonData.accounts.forEach(function (account) {
              pm.expect(account.userId).to.equal('u1');
          });
      });

      pm.test('Each account createdAt is a valid ISO date', function () {
          jsonData.accounts.forEach(function (account) {
              const date = new Date(account.createdAt);
              pm.expect(date.toString()).to.not.equal('Invalid Date');
          });
      });
    language: text/javascript
order: 3000
